# Local hardened platform stack for Atrius HIS development.
#
# Services (default):
#   postgres      :5433  — Optional docker Postgres (default DB: hfs_clinical)
#   elasticsearch :9200  — Optional search index (only if HFS uses postgres-elasticsearch)
#
# Keycloak: use local server https://localhost:8443 (Postgres keycloak_db) — NOT this compose file.
# Optional legacy docker Keycloak (:8180, ephemeral DB): profile legacy-docker-keycloak
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
#   ./scripts/platform-up.sh

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sandhu
      POSTGRES_PASSWORD: parsons02
      POSTGRES_DB: hfs_clinical
    ports:
      - "5433:5432"
    volumes:
      - his_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandhu -d hfs_clinical"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - his_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  keycloak:
    profiles: ["legacy-docker-keycloak"]
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9000/health/ready | grep -q UP || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

volumes:
  his_postgres_data:
  his_es_data:
